<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0E1A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Neon Strike — Soccer Kicks & Goals</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%230A0E1A'/%3E%3Ccircle cx='256' cy='256' r='140' fill='%2300E5FF'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Teko:wght@500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --neon-cyan: #00E5FF;
        --neon-magenta: #FF2D95;
        --neon-green: #39FF14;
        --neon-sodium: #FFB347;
        --bg: #0A0E1A;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; background: #05070E; overflow: hidden; }
      body {
        touch-action: none; overscroll-behavior: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
        font-family: 'Outfit', system-ui, sans-serif;
        background:
          radial-gradient(circle at 50% 30%, rgba(0,229,255,0.12) 0%, transparent 45%),
          radial-gradient(circle at 80% 80%, rgba(255,45,149,0.10) 0%, transparent 40%),
          linear-gradient(180deg, #0A0E1A 0%, #05070E 100%);
      }
      #game {
        width: 100vw; height: 100vh; height: 100dvh;
        display: flex; align-items: center; justify-content: center;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      canvas {
        display: block; touch-action: none;
        border-radius: clamp(0px, 2vw, 24px);
        box-shadow: 0 0 0 1px rgba(0,229,255,0.15), 0 24px 80px rgba(0,0,0,0.6), 0 0 60px rgba(0,229,255,0.08);
        max-height: min(960px, 95vh); max-width: min(540px, 95vw);
      }
      .boot {
        color: var(--neon-cyan);
        font-family: 'Outfit', sans-serif; font-weight: 800; letter-spacing: 3px;
        text-transform: uppercase; font-size: 14px;
        text-shadow: 0 0 16px rgba(0,229,255,0.6);
      }
      @media (max-width: 640px) {
        canvas { border-radius: 0; max-height: 100dvh; max-width: 100vw; }
      }
    </style>
  </head>
  <body>
    <div id="game"><div class="boot" id="bootMsg">NEON STRIKE…</div></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script src="./src/config.js"></script>
    <script src="./src/systems/achievements.js"></script>
    <script src="./src/systems/daily.js"></script>
    <script src="./src/systems/ads.js"></script>
    <script src="./src/systems/iap.js"></script>
    <script src="./src/client/pb.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
