name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build web assets
        run: npm run build

      - name: Verify PWA artifacts
        run: node scripts/verify-pwa.js
